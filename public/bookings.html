<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buchungen - Zayd Hotel</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <button class="lang-switcher" onclick="toggleLang()">EN</button>
    <div class="app-container">
        <nav class="sidebar" id="sidebar"></nav>

        <div class="main-content">
            <div class="page-header">
                <h1>Buchungsverwaltung</h1>
                <button class="btn btn-primary" onclick="openAddBooking()" id="add-booking-btn">+ Neue Buchung</button>
            </div>

            <div id="alert-box"></div>

            <!-- Bookings Table -->
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Kunde</th>
                            <th>Zimmer</th>
                            <th>Check-in</th>
                            <th>Check-out</th>
                            <th>Gesamt</th>
                            <th>Status</th>
                            <th>Zahlung</th>
                            <th>Aktionen</th>
                        </tr>
                    </thead>
                    <tbody id="bookings-table">
                        <tr><td colspan="8" class="no-data">Buchungen werden geladen...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- New Booking Modal -->
    <div class="modal-overlay" id="booking-modal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="booking-modal-title">Neue Buchung</h2>
                <button class="modal-close" onclick="closeBookingModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="booking-form">
                    <div class="form-group">
                        <label for="booking-customer">Kunde</label>
                        <select id="booking-customer" required>
                            <option value="">Kunde w&auml;hlen</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="booking-room">Zimmer</label>
                        <select id="booking-room" required>
                            <option value="">Zimmer w&auml;hlen</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="booking-checkin">Check-in Datum</label>
                        <input type="date" id="booking-checkin" required>
                    </div>
                    <div class="form-group">
                        <label for="booking-checkout">Check-out Datum</label>
                        <input type="date" id="booking-checkout" required>
                    </div>
                    <div class="form-group">
                        <label for="booking-notes">Notizen</label>
                        <textarea id="booking-notes" rows="2" placeholder="Optionale Notizen"></textarea>
                    </div>
                    <div id="price-preview" style="padding:10px; background:#f8f9fa; border-radius:6px; display:none;">
                        <strong>Gesch&auml;tzter Gesamtpreis: </strong><span id="price-estimate">$0</span>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeBookingModal()">Abbrechen</button>
                <button class="btn btn-primary" onclick="saveBooking()">Buchung erstellen</button>
            </div>
        </div>
    </div>

    <!-- Update Status Modal -->
    <div class="modal-overlay" id="status-modal">
        <div class="modal">
            <div class="modal-header">
                <h2>Buchung aktualisieren</h2>
                <button class="modal-close" onclick="closeStatusModal()">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="status-booking-id">
                <div class="form-group">
                    <label for="update-status">Buchungsstatus</label>
                    <select id="update-status">
                        <option value="Confirmed">Confirmed</option>
                        <option value="Checked-in">Checked-in</option>
                        <option value="Checked-out">Checked-out</option>
                        <option value="Cancelled">Cancelled</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="update-payment">Zahlungsstatus</label>
                    <select id="update-payment">
                        <option value="Unpaid">Unpaid</option>
                        <option value="Partial">Partial</option>
                        <option value="Paid">Paid</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeStatusModal()">Abbrechen</button>
                <button class="btn btn-primary" onclick="updateBookingStatus()">Aktualisieren</button>
            </div>
        </div>
    </div>

    <script src="/js/main.js"></script>
    <script>
        requireAuth();
        loadSidebar('bookings');

        const user = JSON.parse(localStorage.getItem('user'));
        let roomsData = [];

        // Hide add button for customers
        if (user.role === 'customer') {
            document.getElementById('add-booking-btn').style.display = 'none';
        }

        async function loadBookings() {
            try {
                const bookings = await apiRequest('/api/bookings');
                const tbody = document.getElementById('bookings-table');

                if (bookings.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="8" class="no-data">Keine Buchungen gefunden</td></tr>';
                    return;
                }

                tbody.innerHTML = bookings.map(function(b) {
                    let statusBadge = 'badge-blue';
                    if (b.status === 'Checked-in') statusBadge = 'badge-green';
                    if (b.status === 'Checked-out') statusBadge = 'badge-gray';
                    if (b.status === 'Cancelled') statusBadge = 'badge-red';

                    let payBadge = 'badge-red';
                    if (b.paymentStatus === 'Paid') payBadge = 'badge-green';
                    if (b.paymentStatus === 'Partial') payBadge = 'badge-yellow';

                    let actions = '';
                    if (user.role === 'admin' || user.role === 'staff') {
                        actions = '<button class="btn btn-warning btn-sm" onclick="openStatusUpdate(\'' + b._id + '\', \'' + b.status + '\', \'' + b.paymentStatus + '\')">Bearbeiten</button>';
                    }
                    if (user.role === 'admin') {
                        actions += ' <button class="btn btn-danger btn-sm" onclick="deleteBooking(\'' + b._id + '\')">L\u00f6schen</button>';
                    }

                    return '<tr>' +
                        '<td>' + (b.customer ? b.customer.name : 'N/A') + '</td>' +
                        '<td>' + (b.room ? b.room.number + ' (' + b.room.type + ')' : 'N/A') + '</td>' +
                        '<td>' + formatDate(b.checkIn) + '</td>' +
                        '<td>' + formatDate(b.checkOut) + '</td>' +
                        '<td>$' + b.totalPrice + '</td>' +
                        '<td><span class="badge ' + statusBadge + '">' + b.status + '</span></td>' +
                        '<td><span class="badge ' + payBadge + '">' + b.paymentStatus + '</span></td>' +
                        '<td class="actions-cell">' + actions + '</td>' +
                    '</tr>';
                }).join('');
            } catch (err) {
                showAlert('Buchungen konnten nicht geladen werden', 'error');
            }
        }

        async function openAddBooking() {
            document.getElementById('booking-form').reset();
            document.getElementById('price-preview').style.display = 'none';

            // Load customers
            try {
                const customers = await apiRequest('/api/customers');
                const customerSelect = document.getElementById('booking-customer');
                customerSelect.innerHTML = '<option value="">Kunde w\u00e4hlen</option>';
                customers.forEach(function(c) {
                    customerSelect.innerHTML += '<option value="' + c._id + '">' + c.name + ' (' + c.email + ')</option>';
                });
            } catch (err) {
                showAlert('Kunden konnten nicht geladen werden', 'error');
            }

            // Load available rooms
            try {
                roomsData = await apiRequest('/api/rooms?status=Available');
                const roomSelect = document.getElementById('booking-room');
                roomSelect.innerHTML = '<option value="">Zimmer w\u00e4hlen</option>';
                roomsData.forEach(function(r) {
                    roomSelect.innerHTML += '<option value="' + r._id + '">Zimmer ' + r.number + ' - ' + r.type + ' ($' + r.price + '/Nacht)</option>';
                });
            } catch (err) {
                showAlert('Zimmer konnten nicht geladen werden', 'error');
            }

            document.getElementById('booking-modal').classList.add('show');
        }

        // Auto-calculate price estimate
        document.getElementById('booking-checkout').addEventListener('change', calculateEstimate);
        document.getElementById('booking-checkin').addEventListener('change', calculateEstimate);
        document.getElementById('booking-room').addEventListener('change', calculateEstimate);

        function calculateEstimate() {
            const roomId = document.getElementById('booking-room').value;
            const checkIn = document.getElementById('booking-checkin').value;
            const checkOut = document.getElementById('booking-checkout').value;

            if (roomId && checkIn && checkOut) {
                const room = roomsData.find(function(r) { return r._id === roomId; });
                if (room) {
                    const start = new Date(checkIn);
                    const end = new Date(checkOut);
                    const nights = Math.ceil((end - start) / (1000 * 60 * 60 * 24));
                    if (nights > 0) {
                        const total = nights * room.price;
                        document.getElementById('price-estimate').textContent = '$' + total + ' (' + nights + ' N\u00e4chte x $' + room.price + ')';
                        document.getElementById('price-preview').style.display = 'block';
                    }
                }
            }
        }

        async function saveBooking() {
            const customer = document.getElementById('booking-customer').value;
            const room = document.getElementById('booking-room').value;
            const checkIn = document.getElementById('booking-checkin').value;
            const checkOut = document.getElementById('booking-checkout').value;
            const notes = document.getElementById('booking-notes').value;

            if (!customer || !room || !checkIn || !checkOut) {
                showAlert('Bitte f\u00fcllen Sie alle Pflichtfelder aus', 'error');
                return;
            }

            try {
                await apiRequest('/api/bookings', 'POST', { customer, room, checkIn, checkOut, notes });
                showAlert('Buchung erfolgreich erstellt', 'success');
                closeBookingModal();
                loadBookings();
            } catch (err) {
                showAlert(err.message || 'Buchung konnte nicht erstellt werden', 'error');
            }
        }

        function openStatusUpdate(id, currentStatus, currentPayment) {
            document.getElementById('status-booking-id').value = id;
            document.getElementById('update-status').value = currentStatus;
            document.getElementById('update-payment').value = currentPayment;
            document.getElementById('status-modal').classList.add('show');
        }

        async function updateBookingStatus() {
            const id = document.getElementById('status-booking-id').value;
            const status = document.getElementById('update-status').value;
            const paymentStatus = document.getElementById('update-payment').value;

            try {
                await apiRequest('/api/bookings/' + id, 'PUT', { status, paymentStatus });
                showAlert('Buchung aktualisiert', 'success');
                closeStatusModal();
                loadBookings();
            } catch (err) {
                showAlert('Buchung konnte nicht aktualisiert werden', 'error');
            }
        }

        async function deleteBooking(id) {
            if (!confirm('Sind Sie sicher, dass Sie diese Buchung l\u00f6schen m\u00f6chten?')) return;
            try {
                await apiRequest('/api/bookings/' + id, 'DELETE');
                showAlert('Buchung gel\u00f6scht', 'success');
                loadBookings();
            } catch (err) {
                showAlert('Buchung konnte nicht gel\u00f6scht werden', 'error');
            }
        }

        function closeBookingModal() {
            document.getElementById('booking-modal').classList.remove('show');
        }

        function closeStatusModal() {
            document.getElementById('status-modal').classList.remove('show');
        }

        loadBookings();
    </script>
</body>
</html>
